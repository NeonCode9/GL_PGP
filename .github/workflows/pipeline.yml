name: Tourism Project Automation Pipeline

on:
  push:
    branches:
      - main

jobs:
  mlops-deployment:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout GitHub Repository Context
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up Modern Python Environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install System and Project Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy xgboost scikit-learn==1.6.1 joblib huggingface_hub

    - name: Execute Pipeline Engine and Local Training
      run: |
        python -c "
        import os, pandas as pd, joblib
        from sklearn.model_selection import train_test_split
        from sklearn.compose import ColumnTransformer
        from sklearn.preprocessing import OneHotEncoder, StandardScaler
        from sklearn.pipeline import Pipeline
        from xgboost import XGBClassifier

        os.makedirs('tourism_project/data', exist_ok=True)
        os.makedirs('tourism_project/model_building', exist_ok=True)
        os.makedirs('tourism_project/deployment', exist_ok=True)

        print('Ingesting datasets...')
        df = pd.read_csv('https://raw.githubusercontent.com/NeonCode9/GL_PGP/main/tourism_project/data/tourism.csv')
        if 'Unnamed: 0' in df.columns: df = df.drop(columns=['Unnamed: 0'])
        if 'CustomerID' in df.columns: df = df.drop(columns=['CustomerID'])
        for col in df.select_dtypes(include=['object']).columns: df[col] = df[col].astype(str).str.strip()
        if 'Gender' in df.columns: df['Gender'] = df['Gender'].replace('Fe Male', 'Female')

        num_cols = ['Age', 'DurationOfPitch', 'NumberOfTrips', 'NumberOfChildrenVisiting', 'NumberOfFollowups', 'MonthlyIncome']
        for col in num_cols: df[col].fillna(df[col].median(), inplace=True)
        for col in ['TypeofContact', 'PreferredPropertyStar']: df[col].fillna(df[col].mode()[0], inplace=True)

        X = df.drop(columns=['ProdTaken'])
        y = df['ProdTaken']
        X_train, X_test, y_train, y_test = train_test_split(X, y, test_size=0.20, random_state=42, stratify=y)
        
        pd.concat([X_train, y_train], axis=1).to_csv('tourism_project/data/train.csv', index=False)
        pd.concat([X_test, y_test], axis=1).to_csv('tourism_project/data/test.csv', index=False)

        preprocessor = ColumnTransformer(transformers=[
            ('scaler', StandardScaler(), X_train.select_dtypes(include=['int64', 'float64']).columns.tolist()),
            ('encoder', OneHotEncoder(handle_unknown='ignore', sparse_output=False), X_train.select_dtypes(include=['object']).columns.tolist())
        ])
        pipeline = Pipeline([('preprocessor', preprocessor), ('classifier', XGBClassifier(n_estimators=200, max_depth=7, learning_rate=0.08, subsample=0.85, random_state=42, eval_metric='logloss'))])
        pipeline.fit(X_train, y_train)
        joblib.dump(pipeline, 'tourism_project/model_building/best_model.pkl')
        print('Local pipelines ready!')
        "

    - name: Push Text Assets via Git Native Authentication
      run: |
        git config --global user.email "sudhakar.yg@gmail.com"
        git config --global user.name "NeonCode9"
        
        # Explicit hardcoded token authentication layout to bypass GitHub Secrets reading bugs
        git clone https://user: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@huggingface.co/spaces/sudhakaryg/demo_project hf_workspace
        
        cp tourism_project/deployment/app.py hf_workspace/app.py
        cp tourism_project/deployment/requirements.txt hf_workspace/requirements.txt
        cp tourism_project/deployment/Dockerfile hf_workspace/Dockerfile
        cp tourism_project/data/train.csv hf_workspace/train.csv
        cp tourism_project/data/test.csv hf_workspace/test.csv
        
        cat << 'EOF' > hf_workspace/README.md
        ---
        title: Wellness Tourism Package Predictor
        emoji: ✈️
        colorFrom: blue
        colorTo: green
        sdk: docker
        app_port: 7860
        pinned: false
        ---
        # ✈️ AI-Driven Tourism Package Prediction Pipeline
        EOF

        cd hf_workspace
        git add .
        git diff-index --quiet HEAD || git commit -m "Automated CI/CD App structural update"
        git push https://user:sudhakaryg@huggingface.co/spaces/sudhakaryg/demo_project main

    - name: Secure High-Level Binary Stream Synchronization
      run: |
        python -c "
        from huggingface_hub import HfApi
        api = HfApi()
        print('Streaming binary artifact safely via hardcoded credential layer...')
        
        api.upload_file(
            path_or_fileobj='tourism_project/model_building/best_model.pkl',
            path_in_repo='best_model.pkl',
            repo_id='sudhakaryg/demo_project',
            repo_type='space',
            token='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'
        )
        print('Automation cycle completed successfully!')
        "

