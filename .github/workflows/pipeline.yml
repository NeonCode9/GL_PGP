name: Tourism Project Automation Pipeline

on:
  push:
    branches:
      - main  # Automatically execute on updates to the main code branch

jobs:
  mlops-automated-lifecycle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v3

      - name: Initialize Environment Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install System Architecture Requirements
        run: |
          pip install --upgrade pip
          pip install -r tourism_project/deployment/requirements.txt

      - name: Run Automated Preprocessing Layers
        run: |
          python tourism_project/model_building/data_prep.py

      - name: Run Model Ingestion & MLflow Tracking
        run: |
          nohup mlflow ui --host 0.0.0.0 --port 5000 &
          sleep 5
          python tourism_project/model_building/train.py

      - name: Sync Data, Weights, and App Components to Hugging Face Space Repository
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions CI/CD Engine"
          
          # Clone target placeholder Space location on Hugging Face
          git clone https://huggingface.co/spaces/sudhakaryg/demo_project destination_space
          
          # Copy application frontend components
          cp tourism_project/deployment/app.py destination_space/app.py
          cp tourism_project/deployment/requirements.txt destination_space/requirements.txt
          cp tourism_project/deployment/Dockerfile destination_space/Dockerfile
          
          # Copy data files and training weights
          cp tourism_project/data/train.csv destination_space/train.csv
          cp tourism_project/data/test.csv destination_space/test.csv
          cp tourism_project/model_building/best_model.pkl destination_space/best_model.pkl
          
          # --- FIXED: Use safe echo commands to explicitly write the required metadata headers ---
          # This guarantees that the YAML text parser never reads raw '---' markers inside a string block.
          echo "---" > destination_space/README.md
          echo "title: Wellness Tourism Package Predictor" >> destination_space/README.md
          echo "emoji: ✈️" >> destination_space/README.md
          echo "colorFrom: blue" >> destination_space/README.md
          echo "colorTo: green" >> destination_space/README.md
          echo "sdk: docker" >> destination_space/README.md
          echo "app_port: 7860" >> destination_space/README.md
          echo "pinned: false" >> destination_space/README.md
          echo "---" >> destination_space/README.md
          echo "" >> destination_space/README.md
          echo "# ✈️ AI-Driven Tourism Package Prediction & MLOps Pipeline" >> destination_space/README.md
          echo "An end-to-end production-grade machine learning and MLOps lifecycle solution engineered for Visit with Us." >> destination_space/README.md
          echo "### 📊 Live System Endpoints" >> destination_space/README.md
          echo "* **Dashboard App:** https://huggingface.co/spaces/sudhakaryg/demo_project" >> destination_space/README.md
          echo "* **Code Repository:** https://github.com/NeonCode9/GL_PGP" >> destination_space/README.md
          print("✔️ Space metadata configuration header compiled safely.")
          
          cd destination_space
          git add .
          git commit -m "Production Update: Overwrite app, assets, and metadata header. Run: ${{ github.run_number }}" || echo "No pipeline variances detected."
          git push https://sudhakaryg:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/sudhakaryg/demo_project main
