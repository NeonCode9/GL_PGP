name: Tourism Project Automation Pipeline

on:
  push:
    branches:
      - main  # Automatically triggers on every push to your main branch

jobs:
  mlops-automated-lifecycle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v3

      - name: Initialize Environment Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install Architecture System Requirements
        run: |
          pip install --upgrade pip
          pip install -r tourism_project/deployment/requirements.txt

      - name: Execute Automated Preprocessing Layer
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USER: ${{ secrets.HF_USER }}
        run: |
          python tourism_project/model_building/data_prep.py

      - name: Execute Model Ingestion & MLflow Tracking
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USER: ${{ secrets.HF_USER }}
        run: |
          nohup mlflow ui --host 0.0.0.0 --port 5000 &
          sleep 5
          python tourism_project/model_building/train.py

      - name: Sync App Elements with Production Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USER: ${{ secrets.HF_USER }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions Automation"
          
          # Clones your dedicated Streamlit App space on Hugging Face
          git clone https://huggingface.co/spaces/${{ secrets.HF_USER }}/tourism-predictor-app production_app
          
          # Sync code updates from your GitHub workspace straight to the Hugging Face production repository
          cp tourism_project/deployment/app.py production_app/app.py
          cp tourism_project/deployment/requirements.txt production_app/requirements.txt
          cp tourism_project/deployment/Dockerfile production_app/Dockerfile
          
          cd production_app
          git add .
          git commit -m "Automated CI/CD build deployment number: ${{ github.run_number }}" || echo "No new variations found to sync."
          git push https://${{ secrets.HF_USER }}:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/${{ secrets.HF_USER }}/tourism-predictor-app main
